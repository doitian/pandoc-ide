name: Docker

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "docker/**"
      - ".github/workflows/docker-workflow.yml"
      - ".devcontainer/**"

jobs:
  build-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: docker
          push: true
          tags: ghcr.io/${{github.actor}}/pandoc-ide:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push-dev:
    name: Build and Push Dev
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Build Dev
        uses: docker/build-push-action@v7
        with:
          context: docker
          file: docker/dev.Dockerfile
          push: true
          tags: ghcr.io/${{github.actor}}/pandoc-ide:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
